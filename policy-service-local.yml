spring:

  datasource:
    url: jdbc:mysql://localhost:3306/insurance_db
    username: root
    password: Maggi@10128
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false

resilience4j:
  circuitbreaker:
    instances:
      policyService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  retry:
    instances:
      policyService:
        maxAttempts: 3
        waitDuration: 2s

  bulkhead:
    instances:
      policyService:
        maxConcurrentCalls: 10

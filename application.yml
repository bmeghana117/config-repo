eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,beans,circuitbreakers,prometheus
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      policy-service:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2

  retry:
    instances:
      policy-service:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - feign.RetryableException
          - java.io.IOException

  ratelimiter:
    instances:
      policy-service:
        limitForPeriod: 5          # max 5 calls
        limitRefreshPeriod: 10s    # every 10 seconds
        timeoutDuration: 2s

  bulkhead:
    instances:
      policy-service:
        maxConcurrentCalls: 5
        maxWaitDuration: 2s

